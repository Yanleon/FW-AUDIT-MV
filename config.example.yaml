project:
  name: "Auditoría Multi-Vendor Firewall"
  client: "Mi Empresa"
  tester: "Equipo de Ciberseguridad"
  environment: "Producción Controlada"
  authorization_id: "CHG-2026-001"

scope:
  mode: "full"
  safe_mode: true
  max_parallel_scans: 2
  default_timeout: 120

blackbox:
  enabled: true
  public_ips:
    - "200.10.10.10"

  tcp_ports: "1-1000"
  full_tcp_scan: false
  udp_scan: true
  udp_top_ports: 50
  service_detection: true

  tls_ports:
    - 443
    - 8443
    - 9443

  blocked_public_ports:
    - 22
    - 23
    - 445
    - 3389
    - 5900
    - 8080
    - 8443

  allowed_public_ports:
    - 80
    - 443
    - 500
    - 4500

internal_tests:
  enabled: true
  targets:
    - name: "Servidor AD"
      ip: "10.10.1.10"
      allowed_ports: [53, 88, 389, 445]
      blocked_ports: [3389, 5985, 5986]

egress:
  enabled: true
  controlled_external_ip: "8.8.8.8"
  test_ports:
    - 21
    - 22
    - 23
    - 25
    - 53
    - 80
    - 443
    - 445
    - 587
    - 993
    - 995
    - 1433
    - 3306
    - 3389

vendors:
  - name: "FW-FORTI-BOG"
    vendor: "fortigate"
    enabled: true
    management_ip: "10.10.99.10"
    auth_method: "api"
    api_token_env: "FORTIGATE_TOKEN"
    verify_ssl: false

  - name: "FW-PALOALTO-MDE"
    vendor: "paloalto"
    enabled: false
    management_ip: "10.10.99.20"
    auth_method: "api"
    api_token_env: "PALOALTO_TOKEN"
    verify_ssl: true

  - name: "FW-CHECKPOINT-CALI"
    vendor: "checkpoint"
    enabled: false
    management_ip: "10.10.99.30"
    auth_method: "api"
    username_env: "CHECKPOINT_USER"
    password_env: "CHECKPOINT_PASS"
    verify_ssl: true

reporting:
  markdown: true
  html: true
  json: true
  include_raw_evidence: true
